<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Check-in Hoteleiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- SEÇÃO DO FORMULÁRIO -->
        <div id="formSection" class="bg-white rounded-lg shadow-lg p-6 md:p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Pré-Check-in</h1>
                <p class="text-gray-600">Preencha seus dados antes de chegar</p>
            </div>

            <form id="checkinForm" class="space-y-4">
                <!-- Nome Completo -->
                <div>
                    <label for="nome" class="block text-sm font-semibold text-gray-700 mb-2">
                        Nome Completo
                    </label>
                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        placeholder="Seu nome completo"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    />
                </div>

                <!-- CPF/Passaporte -->
                <div>
                    <label for="documento" class="block text-sm font-semibold text-gray-700 mb-2">
                        CPF ou Passaporte
                    </label>
                    <input
                        type="text"
                        id="documento"
                        name="documento"
                        placeholder="XXX.XXX.XXX-XX ou passaporte"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    />
                </div>

                <!-- Celular -->
                <div>
                    <label for="celular" class="block text-sm font-semibold text-gray-700 mb-2">
                        Celular
                    </label>
                    <input
                        type="tel"
                        id="celular"
                        name="celular"
                        placeholder="(XX) XXXXX-XXXX"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    />
                </div>

                <!-- Data de Nascimento -->
                <div>
                    <label for="dataNascimento" class="block text-sm font-semibold text-gray-700 mb-2">
                        Data de Nascimento
                    </label>
                    <input
                        type="date"
                        id="dataNascimento"
                        name="dataNascimento"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    />
                </div>

                <!-- Botão Enviar -->
                <button
                    type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105 active:scale-95"
                >
                    Gerar QR Code
                </button>
            </form>

            <!-- Mensagem de Erro -->
            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
                <p class="text-red-700 text-sm font-semibold" id="errorText"></p>
            </div>

            <!-- Indicador de Carregamento -->
            <div id="loadingIndicator" class="hidden mt-4 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                <p class="text-gray-600 text-sm mt-2">Processando...</p>
            </div>
        </div>

        <!-- SEÇÃO DE SUCESSO COM QR CODE -->
        <div id="successSection" class="hidden bg-white rounded-lg shadow-lg p-6 md:p-8 text-center">
            <div class="mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Check-in Concluído!</h2>
                <p class="text-gray-600 mb-4">Apresente este QR Code na recepção</p>
            </div>

            <!-- Container QR Code -->
            <div class="bg-gray-50 p-6 rounded-lg mb-6 border-2 border-dashed border-gray-300">
                <div id="qrcodeContainer" class="flex justify-center"></div>
            </div>

            <!-- ID de Referência -->
            <div class="bg-blue-50 p-4 rounded-lg mb-6">
                <p class="text-sm text-gray-600 mb-2">Seu ID de Referência:</p>
                <p id="referenceId" class="text-xl font-mono font-bold text-indigo-600 break-all"></p>
            </div>

            <!-- Dados Confirmados -->
            <div class="bg-gray-50 p-4 rounded-lg mb-6 text-left">
                <h3 class="font-semibold text-gray-800 mb-3">Dados Confirmados:</h3>
                <div class="space-y-2 text-sm text-gray-700">
                    <p><span class="font-semibold">Nome:</span> <span id="confirmNome"></span></p>
                    <p><span class="font-semibold">Documento:</span> <span id="confirmDocumento"></span></p>
                    <p><span class="font-semibold">Celular:</span> <span id="confirmCelular"></span></p>
                    <p><span class="font-semibold">Nascimento:</span> <span id="confirmData"></span></p>
                </div>
            </div>

            <!-- Status -->
            <div class="bg-green-50 border border-green-200 p-3 rounded-lg mb-6">
                <p class="text-green-700 font-semibold text-sm">
                    ✓ Pré-Check-in Concluído
                </p>
            </div>

            <!-- Botões -->
            <div class="space-y-3">
                <button
                    id="printBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition"
                >
                    Imprimir QR Code
                </button>
                <button
                    id="resetBtn"
                    class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-4 rounded-lg transition"
                >
                    Novo Check-in
                </button>
            </div>
        </div>
    </div>

    <script>
        // API Base URL
        const API_BASE = 'http://localhost:3000';

        // Elementos do DOM
        const formSection = document.getElementById('formSection');
        const successSection = document.getElementById('successSection');
        const checkinForm = document.getElementById('checkinForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const qrcodeContainer = document.getElementById('qrcodeContainer');
        const referenceId = document.getElementById('referenceId');
        const resetBtn = document.getElementById('resetBtn');
        const printBtn = document.getElementById('printBtn');

        // Event Listener - Submissão do Formulário
        checkinForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            await submitCheckin();
        });

        // Event Listener - Botão Novo Check-in
        resetBtn.addEventListener('click', resetForm);

        // Event Listener - Botão Imprimir
        printBtn.addEventListener('click', printQRCode);

        /**
         * Submete os dados do check-in para o backend
         */
        async function submitCheckin() {
            try {
                // Mostrar indicador de carregamento
                loadingIndicator.classList.remove('hidden');
                errorMessage.classList.add('hidden');

                // Coletar dados do formulário
                const formData = {
                    nome: document.getElementById('nome').value.trim(),
                    documento: document.getElementById('documento').value.trim(),
                    celular: document.getElementById('celular').value.trim(),
                    dataNascimento: document.getElementById('dataNascimento').value.trim()
                };

                // Validação básica
                if (!formData.nome || !formData.documento || !formData.celular || !formData.dataNascimento) {
                    throw new Error('Por favor, preencha todos os campos');
                }

                // Fazer requisição POST para o backend
                const response = await fetch(`${API_BASE}/api/checkin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    throw new Error(`Erro ao processar check-in: ${response.statusText}`);
                }

                const result = await response.json();

                if (!result.id) {
                    throw new Error('Erro ao gerar ID de check-in');
                }

                // Exibir sucesso
                displaySuccess(result.id, formData);

            } catch (error) {
                // Exibir erro
                showError(error.message);
            } finally {
                // Ocultar indicador de carregamento
                loadingIndicator.classList.add('hidden');
            }
        }

        /**
         * Exibe a seção de sucesso com QR Code
         */
        function displaySuccess(id, formData) {
            // Preencher dados confirmados
            document.getElementById('confirmNome').textContent = formData.nome;
            document.getElementById('confirmDocumento').textContent = formData.documento;
            document.getElementById('confirmCelular').textContent = formData.celular;
            document.getElementById('confirmData').textContent = new Date(formData.dataNascimento).toLocaleDateString('pt-BR');
            document.getElementById('referenceId').textContent = id;

            // Limpar container anterior
            qrcodeContainer.innerHTML = '';

            // Gerar QR Code
            new QRCode(qrcodeContainer, {
                text: id,
                width: 250,
                height: 250,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            // Ocultar formulário e exibir sucesso
            formSection.classList.add('hidden');
            successSection.classList.remove('hidden');
        }

        /**
         * Exibe mensagem de erro
         */
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        /**
         * Reseta o formulário para um novo check-in
         */
        function resetForm() {
            checkinForm.reset();
            formSection.classList.remove('hidden');
            successSection.classList.add('hidden');
            errorMessage.classList.add('hidden');
        }

        /**
         * Imprime o QR Code
         */
        function printQRCode() {
            const printWindow = window.open('', '', 'height=400,width=600');
            const qrImage = qrcodeContainer.querySelector('canvas').toDataURL();
            const id = document.getElementById('referenceId').textContent;

            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>QR Code - Pré-Check-in</title>
                    <style>
                        body {
                            font-family: Arial, sans-serif;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            padding: 20px;
                        }
                        .container {
                            text-align: center;
                        }
                        h1 {
                            margin-bottom: 20px;
                            font-size: 24px;
                        }
                        img {
                            margin: 20px 0;
                            border: 2px solid #000;
                            padding: 10px;
                        }
                        .id {
                            font-weight: bold;
                            font-size: 18px;
                            margin-top: 20px;
                            font-family: monospace;
                        }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <h1>Pré-Check-in Hoteleiro</h1>
                        <img src="${qrImage}" alt="QR Code">
                        <p class="id">ID: ${id}</p>
                        <p>Apresente este código na recepção</p>
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => printWindow.print(), 500);
        }
    </script>
</body>
</html>
